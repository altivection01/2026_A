# =============================================================================
# THE FILE YOU EDIT.  Add/remove entries, then run:  ansible-playbook push_umbrella.yml
#   action: deny  -> blacklist (Umbrella block list)
#   action: allow -> whitelist (Umbrella allow list)
#   destination:  domain | full URL | IPv4   (type is auto-detected)
#   state:        present (default) | absent  (absent removes the entry)
# Guardrails are enforced by the connector:
#   - a deny on critical infrastructure is REFUSED
#   - an IP deny or a URL allow is ESCALATED (not expressible in Umbrella DNS)
# =============================================================================
umbrella_entries:
  - destination: malware-c2.example
    action: deny
    comment: "Confirmed C2 (INC0456)"

  - destination: vendor-portal.partner.com
    action: allow
    comment: "AP vendor portal — expires 2026-09-01 (reconcile job removes)"

  - destination: "https://bad.example/login.php"
    action: deny
    comment: "Phishing kit URL (INC0461)"

  - destination: 198.51.100.10
    action: allow
    comment: "Partner SFTP source IP"

  # --- these two demonstrate the guardrails (left in deliberately) ---
  - destination: microsoft.com        # deny on critical infra -> REFUSED
    action: deny
    comment: "user thinks a popup is malware"

  - destination: 203.0.113.66         # IP deny -> ESCALATED (firewall job, not DNS)
    action: deny
    comment: "perimeter scanner"
